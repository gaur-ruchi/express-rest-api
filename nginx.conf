events { 
    worker_connections 1024; 
}

http {
    upstream node_app {
        server app:8080;
    }

    server {
        listen 80;
        # 🟢 CHANGED: Replace with your actual domain name (e.g., example.com ://example.com)
        server_name yourdomain.com ://wind-drift.online; 

        # Required by Certbot to verify that you own the domain name
        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        # Automatically redirects all HTTP web traffic to secure HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 🟢 ADDED: Secure HTTPS Server configuration block
    server {
        listen 443 ssl;
        server_name yourdomain.com ://wind-drift.online;

        # Paths to the SSL keys that Certbot will generate on your server
        ssl_certificate /etc/letsencrypt/live/://wind-drift.online;
        ssl_certificate_key /etc/letsencrypt/live/://wind-drift.online;

        # Production-grade SSL performance configurations
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://node_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
