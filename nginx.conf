events { 
    worker_connections 1024; 
}

http {
    upstream node_app {
        server app:8080;
    }

    # HTTP Config: Redirect all traffic to HTTPS
    server {
        listen 80;
        server_name wind-drift.online www.wind-drift.online; 

        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Config: Secure Reverse Proxy
    server {
        listen 443 ssl;
        server_name wind-drift.online www.wind-drift.online;

        ssl_certificate /etc/letsencrypt/live/wind-drift.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/wind-drift.online/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://node_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
