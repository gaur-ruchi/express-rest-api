events { 
    worker_connections 1024; 
}

http {
    upstream node_app {
        server app:8080;
    }

    server {
        listen 80;
        server_name wind-drift.online www.wind-drift.online; 

        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        location / {
            proxy_pass http://node_app;
        }
    }

    # 🛑 TEMPORARILY COMMENTED OUT OR REMOVED
    # server {
    #     listen 443 ssl;
    #     ...
    # }
}
